name: Python SDK CI

on:
  push:
    branches: [main, master]
    paths:
      - 'python-sdk/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'python-sdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    defaults:
      run:
        working-directory: ./python-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov black ruff mypy

      - name: Lint with ruff
        run: ruff check captcha_background_sdk/

      - name: Format check with black
        run: black --check captcha_background_sdk/

      - name: Type check with mypy
        run: mypy captcha_background_sdk/

      - name: Test with pytest
        run: pytest tests/ -v --cov=captcha_background_sdk --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./python-sdk/coverage.xml
          flags: python
          name: python-sdk-py${{ matrix.python-version }}

  build:
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: ./python-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: python-sdk/dist/
