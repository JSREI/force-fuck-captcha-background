name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to package/upload assets for (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  update_release_notes:
    name: Update release notes
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub release notes
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const release = context.payload.release;

            const generated = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: release.tag_name,
              target_commitish: release.target_commitish,
            });

            const existingBody = (release.body || "").trim();
            const generatedBody = (generated.data.body || "").trim();
            const combinedBody = existingBody
              ? existingBody + "\n\n---\n\n" + generatedBody
              : generatedBody;

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              name: release.name && release.name.trim() ? release.name : release.tag_name,
              body: combinedBody,
              draft: false,
              prerelease: release.prerelease,
            });

  build_python_sdk:
    name: Build Python SDK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Detect Python SDK layout
        id: sdk_layout
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "sdk/python/captcha-background-sdk" ]]; then
            sdk_dir="sdk/python/captcha-background-sdk"
          elif [[ -d "sdk/python/captcha-font-sdk" ]]; then
            sdk_dir="sdk/python/captcha-font-sdk"
          else
            echo "::error::No supported Python SDK directory found under sdk/python/."
            exit 1
          fi

          if [[ -f "${sdk_dir}/captcha_background_sdk/__init__.py" ]]; then
            package_module="captcha_background_sdk"
          elif [[ -f "${sdk_dir}/captcha_font_sdk/__init__.py" ]]; then
            package_module="captcha_font_sdk"
          else
            echo "::error::Unable to locate SDK __init__.py in ${sdk_dir}."
            exit 1
          fi

          echo "sdk_dir=${sdk_dir}" >> "$GITHUB_OUTPUT"
          echo "package_module=${package_module}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release tag matches SDK version
        shell: bash
        working-directory: ${{ steps.sdk_layout.outputs.sdk_dir }}
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          PACKAGE_MODULE: ${{ steps.sdk_layout.outputs.package_module }}
        run: |
          release_version="${RELEASE_TAG#v}"
          package_version="$(python - <<'PY'
          import re
          from pathlib import Path

          import os
          module = os.environ["PACKAGE_MODULE"]
          content = Path(f"{module}/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__\s*=\s*["\']([^"\']+)["\']', content, re.MULTILINE)
          if not match:
              raise SystemExit(f"Unable to locate __version__ in {module}/__init__.py")
          print(match.group(1))
          PY
          )"

          if [[ "${release_version}" != "${package_version}" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match ${PACKAGE_MODULE}.__version__ (${package_version})."
            exit 1
          fi

      - name: Install build tooling
        shell: bash
        working-directory: ${{ steps.sdk_layout.outputs.sdk_dir }}
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        shell: bash
        working-directory: ${{ steps.sdk_layout.outputs.sdk_dir }}
        run: python -m build

      - name: Validate distributions
        shell: bash
        working-directory: ${{ steps.sdk_layout.outputs.sdk_dir }}
        run: python -m twine check dist/*

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: ${{ steps.sdk_layout.outputs.sdk_dir }}/dist/*
          if-no-files-found: error

  publish_python_sdk:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs:
      - build_python_sdk
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    environment:
      name: pypi
      url: https://pypi.org/project/captcha-background-sdk/
    permissions:
      contents: read
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Check PyPI token
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${PYPI_API_TOKEN}" ]]; then
            echo "::error::Missing environment secret PYPI_API_TOKEN in the pypi environment."
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist

  build_electron_ui:
    name: Build Electron UI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            build_command: npx electron-builder --mac zip dmg --publish never
          - name: Windows
            os: windows-latest
            build_command: npx electron-builder --win nsis portable --publish never
          - name: Linux
            os: ubuntu-latest
            build_command: npx electron-builder --linux AppImage deb --publish never
    defaults:
      run:
        shell: bash
        working-directory: apps/electron-ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/electron-ui/package-lock.json

      - name: Set up Python for native module builds
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Normalize package metadata for packaging
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));

          if (!pkg.homepage || typeof pkg.homepage !== 'string' || !pkg.homepage.trim()) {
            pkg.homepage = 'https://github.com/JSREI/force-fuck-captcha-background';
          }

          if (!pkg.author || typeof pkg.author !== 'object') {
            const authorName = typeof pkg.author === 'string' && pkg.author.trim() ? pkg.author.trim() : 'JSREI';
            pkg.author = { name: authorName };
          }
          if (!pkg.author.name || !String(pkg.author.name).trim()) {
            pkg.author.name = 'JSREI';
          }
          if (!pkg.author.email || !String(pkg.author.email).trim()) {
            pkg.author.email = 'cc11001100@users.noreply.github.com';
          }

          pkg.build = pkg.build || {};
          pkg.build.linux = pkg.build.linux || {};
          if (!pkg.build.linux.maintainer || !String(pkg.build.linux.maintainer).trim()) {
            pkg.build.linux.maintainer = `${pkg.author.name} <${pkg.author.email}>`;
          }

          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Align desktop package version with release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          release_version="${RELEASE_TAG#v}"
          npm version "${release_version}" --no-git-tag-version

      - name: Build webpack bundles
        run: npm run build:webpack

      - name: Package Electron application
        run: ${{ matrix.build_command }}

      - name: Upload Electron release assets
        uses: actions/upload-artifact@v4
        with:
          name: electron-release-${{ matrix.os }}
          path: |
            apps/electron-ui/release/**/*.dmg
            apps/electron-ui/release/**/*.zip
            apps/electron-ui/release/**/*.exe
            apps/electron-ui/release/**/*.AppImage
            apps/electron-ui/release/**/*.deb
            apps/electron-ui/release/**/*.blockmap
          if-no-files-found: error

  upload_release_assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build_python_sdk.result == 'success' }}
    needs:
      - build_python_sdk
      - build_electron_ui
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show collected files
        shell: bash
        run: find release-assets -type f -print0 | xargs -0 ls -lh | sort

      - name: Collect and validate release assets
        id: collect_assets
        shell: bash
        run: |
          set -euo pipefail

          python_dist="$(find release-assets/python-dist -maxdepth 1 -type f | sort)"
          mac_installers="$(find release-assets/electron-release-macos-latest -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' \) | sort)"
          windows_installers="$(find release-assets/electron-release-windows-latest -maxdepth 1 -type f -name '*.exe' | sort)"
          linux_installers="$(find release-assets/electron-release-ubuntu-latest -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.deb' \) | sort)"
          optional_blockmaps="$(find release-assets -type f -name '*.blockmap' | sort)"

          if [[ -z "${python_dist}" ]]; then
            echo "::error::No Python distributions found."
            exit 1
          fi
          if [[ -z "${mac_installers}" ]]; then
            echo "::error::No macOS installers (.dmg/.zip) found."
            exit 1
          fi
          if [[ -z "${windows_installers}" ]]; then
            echo "::error::No Windows installers (.exe) found."
            exit 1
          fi
          if [[ -z "${linux_installers}" ]]; then
            echo "::error::No Linux installers (.AppImage/.deb) found."
            exit 1
          fi

          required_manifest="$(mktemp)"
          {
            printf '%s\n' "${python_dist}"
            printf '%s\n' "${mac_installers}"
            printf '%s\n' "${windows_installers}"
            printf '%s\n' "${linux_installers}"
          } | awk 'NF' > "${required_manifest}"

          while IFS= read -r file; do
            if [[ ! -s "${file}" ]]; then
              echo "::error::Release asset is empty: ${file}"
              exit 1
            fi
          done < "${required_manifest}"

          {
            cat "${required_manifest}"
            printf '%s\n' "${optional_blockmaps}"
          } | awk 'NF' > release-assets/asset-files.txt
          rm -f "${required_manifest}"

          echo "Release asset manifest:"
          cat release-assets/asset-files.txt

          {
            echo "files<<EOF"
            cat release-assets/asset-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: ${{ steps.collect_assets.outputs.files }}
